name = "ender-supporter"
main = "index.js"
compatibility_date = "2024-09-23"

# Create the KV namespace first:
#   wrangler kv namespace create SUPPORTERS
# Then paste the returned id below.
[[kv_namespaces]]
binding = "SUPPORTERS"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"

[vars]
# No public vars needed — STRIPE_WEBHOOK_SECRET is a secret:
#   wrangler secret put STRIPE_WEBHOOK_SECRET
